<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>sajha karobar</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="sajha karobar - साझा समाधान, सजिलो व्यापार">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="sajha karobar">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-title" content="sajha karobar">
    <link rel="apple-touch-startup-image" href="/assets/images/icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #f59e0b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center">

    <!-- Loading / Redirect Screen -->
    <div class="text-center">
        <div class="flex justify-center mb-6">
            <img src="/assets/images/logo.png" alt="sajha karobar" class="h-20 w-20 rounded-2xl shadow-lg ring-2 ring-amber-400/30">
        </div>
        <h1 class="text-2xl font-bold text-white mb-1">sajha karobar</h1>
        <p class="text-xs text-amber-400/70 font-medium uppercase tracking-wider mb-8">"साझा समाधान, सजिलो व्यापार"</p>
        <div class="flex justify-center mb-6">
            <div class="loader"></div>
        </div>
        <p class="text-sm text-slate-400">Loading...</p>

        <!-- Install Button (hidden until install prompt) -->
        <button id="installBtn" class="hidden mt-6 bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 text-[#0f172a] font-semibold py-2.5 px-6 rounded-lg transition shadow-md">
            <i class="fa-solid fa-download mr-2"></i> Install App
        </button>
        <!-- iOS Install Instructions -->
        <div id="iosInstall" class="hidden mt-6 bg-white/10 backdrop-blur rounded-xl p-4 max-w-xs mx-auto">
            <p class="text-white text-sm font-medium mb-2">Install on iPhone</p>
            <p class="text-slate-300 text-xs">Tap <svg class="inline w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.5 3.5-1.4 1.4L13 5.8V16h-2V5.8L9.9 6.9 8.5 5.5 12 2zm7 9v9c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2v-9h2v9h10v-9h2z"/></svg> then <strong>"Add to Home Screen"</strong></p>
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>

    <!-- PWA Install Prompt -->
    <script>
        let deferredPrompt;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        // Show iOS install instructions
        if (isIOS && !isStandalone) {
            document.getElementById('iosInstall').classList.remove('hidden');
        }

        document.getElementById('installBtn').addEventListener('click', () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                console.log('Install:', choice.outcome);
                deferredPrompt = null;
                document.getElementById('installBtn').classList.add('hidden');
            });
        });
    </script>

    <!-- Auto-redirect based on auth -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = '/dashboard';
            } else {
                window.location.href = '/login';
            }
        })();
    </script>
</body>
</html>
