<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>sajha karobar</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#581C87">
    <meta name="description" content="sajha karobar - साझा समाधान, सजिलो व्यापार">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="sajha karobar">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-title" content="sajha karobar">
    <link rel="apple-touch-startup-image" href="/assets/images/icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #DB2777;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        .fade-in-delayed { animation: fadeIn 0.6s ease-out 0.2s both; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.3); } 70% { box-shadow: 0 0 0 12px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        .pulse-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="bg-[#581C87] min-h-screen flex items-center justify-center" style="background: linear-gradient(160deg, #3B0764 0%, #581C87 30%, #7C3AED 60%, #DB2777 100%);">

    <!-- Loading / Redirect Screen -->
    <div class="text-center fade-in">
        <div class="flex justify-center mb-6">
            <img src="/assets/images/logo.png" alt="sajha karobar" class="h-20 w-20 rounded-2xl shadow-2xl ring-2 ring-pink-400/30 pulse-ring">
        </div>
        <h1 class="text-2xl font-bold text-white mb-1">sajha karobar</h1>
        <p class="text-xs text-pink-400/70 font-medium uppercase tracking-wider mb-8">"साझा समाधान, सजिलो व्यापार"</p>
        <div class="flex justify-center mb-6">
            <div class="loader"></div>
        </div>
        <p class="text-sm text-slate-400">Loading...</p>

        <!-- Install Button (hidden until install prompt) -->
        <button id="installBtn" class="hidden mt-6 bg-gradient-to-r from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 text-[#581C87] font-bold py-3 px-8 rounded-xl transition shadow-lg shadow-pink-400/20 text-sm">
            <i class="fa-solid fa-download mr-2"></i> Install App
        </button>
        <!-- iOS Install Instructions -->
        <div id="iosInstall" class="hidden mt-6 fade-in-delayed max-w-xs mx-auto">
            <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/10">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <div class="h-8 w-8 rounded-full bg-pink-400/20 flex items-center justify-center">
                        <i class="fa-solid fa-mobile-screen text-pink-400 text-sm"></i>
                    </div>
                    <p class="text-white text-sm font-bold">Add to Home Screen</p>
                </div>
                <div class="space-y-2.5">
                    <div class="flex items-center gap-3 bg-white/5 rounded-lg px-3 py-2">
                        <span class="h-6 w-6 rounded-full bg-violet-500/20 text-purple-400 flex items-center justify-center text-xs font-bold">1</span>
                        <p class="text-slate-300 text-xs">Tap <svg class="inline w-4 h-4 text-purple-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.5 3.5-1.4 1.4L13 5.8V16h-2V5.8L9.9 6.9 8.5 5.5 12 2zm7 9v9c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2v-9h2v9h10v-9h2z"/></svg> <strong class="text-white">Share</strong> button</p>
                    </div>
                    <div class="flex items-center gap-3 bg-white/5 rounded-lg px-3 py-2">
                        <span class="h-6 w-6 rounded-full bg-violet-500/20 text-purple-400 flex items-center justify-center text-xs font-bold">2</span>
                        <p class="text-slate-300 text-xs">Scroll & tap <strong class="text-white">"Add to Home Screen"</strong></p>
                    </div>
                    <div class="flex items-center gap-3 bg-white/5 rounded-lg px-3 py-2">
                        <span class="h-6 w-6 rounded-full bg-pink-400/20 text-pink-400 flex items-center justify-center text-xs font-bold">3</span>
                        <p class="text-slate-300 text-xs">Tap <strong class="text-white">"Add"</strong> to install</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>

    <!-- PWA Install Prompt -->
    <script>
        let deferredPrompt;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        // Show iOS install instructions
        if (isIOS && !isStandalone) {
            document.getElementById('iosInstall').classList.remove('hidden');
        }

        document.getElementById('installBtn').addEventListener('click', () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                console.log('Install:', choice.outcome);
                deferredPrompt = null;
                document.getElementById('installBtn').classList.add('hidden');
            });
        });
    </script>

    <!-- Auto-redirect based on auth (delayed on iOS to show install guide) -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            const dest = token ? '/dashboard' : '/login';
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

            // If iOS and NOT already installed, delay redirect so user can see install instructions
            if (isIOS && !isStandalone) {
                // Show a "Continue" button so user can proceed when ready
                const continueBtn = document.createElement('button');
                continueBtn.textContent = 'Continue to App →';
                continueBtn.className = 'mt-5 bg-white/10 backdrop-blur border border-white/20 text-white hover:bg-white/20 font-semibold py-2.5 px-6 rounded-xl transition text-sm fade-in-delayed';
                continueBtn.style.cssText = 'animation: fadeIn 0.6s ease-out 0.5s both;';
                continueBtn.addEventListener('click', function() { window.location.href = dest; });
                document.querySelector('.text-center').appendChild(continueBtn);
                // Auto-redirect after 6 seconds if user doesn't tap
                setTimeout(function() { window.location.href = dest; }, 6000);
            } else {
                window.location.href = dest;
            }
        })();
    </script>
</body>
</html>
