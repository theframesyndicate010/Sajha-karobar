<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>sajha karobar - Product Details</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for the graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; padding-top: env(safe-area-inset-top); }
        
        /* Custom Scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Animation for cards */
        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .detail-value {
            color: #2d3748;
            font-weight: 500;
            font-size: 1rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden flex">

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 h-full">
        
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 lg:px-8 z-10">
            <!-- Left: Mobile Menu & Search -->
            <div class="flex items-center gap-4 flex-1">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-[#2563eb] p-1">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                
                <div class="relative w-full max-w-md hidden sm:block">
                    <span class="absolute left-3 top-2.5 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" placeholder="Search items, bills, or customers..." class="w-full bg-gray-100 hover:bg-gray-50 focus:bg-white border border-transparent focus:border-blue-200 rounded-lg py-2 pl-10 pr-4 text-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-100">
                </div>
            </div>

            <!-- Right: Notifications & Profile -->
            <div class="flex items-center gap-4 lg:gap-6">
                <button class="relative text-gray-400 hover:text-[#2563eb] transition p-2 rounded-full hover:bg-gray-50">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-1.5 right-2 h-2.5 w-2.5 bg-amber-400 rounded-full border-2 border-white"></span>
                </button>
                
                <div class="h-8 w-px bg-gray-200 hidden sm:block"></div>
                
                <div class="flex items-center gap-3 cursor-pointer p-1 rounded-lg hover:bg-gray-50 transition">
                    <div class="text-right hidden sm:block">
                        <p id="headerUserName" class="text-sm font-bold text-gray-800 leading-none">Loading...</p>
                    </div>
                    <div id="headerUserInitial" class="h-10 w-10 rounded-full bg-gradient-to-br from-slate-700 to-slate-800 text-amber-400 border border-slate-600 flex items-center justify-center font-bold shadow-sm">
                        ?
                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Dashboard Area -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-8">
            
            <!-- Page Title -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div>
                    <a href="/dashboard" class="text-[#2563eb] hover:text-[#2563eb] text-sm mb-2 inline-flex items-center gap-1">
                        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <h2 class="text-2xl font-bold text-gray-900">Product Details</h2>
                    <p class="text-gray-500 text-sm mt-1" id="productSubtitle">View product information</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="editProduct()" class="bg-[#1e40af] hover:bg-[#2563eb] text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition">
                        <i class="fa-solid fa-pen"></i> Edit
                    </button>
                    <button onclick="deleteProduct()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition">
                        <i class="fa-solid fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <!-- Product Details Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 max-w-3xl">
                <div id="errorMessage" class="hidden bg-blue-50 border border-blue-200 text-[#2563eb] px-4 py-3 rounded-lg text-sm mb-6"></div>
                <div id="loadingMessage" class="text-center py-8">
                    <i class="fa-solid fa-spinner animate-spin text-[#2563eb] text-2xl mb-2"></i>
                    <p class="text-gray-600">Loading product details...</p>
                </div>

                <!-- Product Details Container (Hidden until loaded) -->
                <div id="productDetailsContainer" class="hidden space-y-8">
                    
                    <!-- Product Name -->
                    <div class="pb-6 border-b border-gray-200">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Product Name</label>
                        <p class="detail-value" id="detailName">-</p>
                    </div>

                    <!-- Category & Price Row -->
                    <div class="grid grid-cols-2 gap-6 pb-6 border-b border-gray-200">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Category Type</label>
                            <p class="detail-value" id="detailCategory">-</p>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Product Price (Rs)</label>
                            <p class="detail-value text-[#2563eb]" id="detailPrice">-</p>
                        </div>
                    </div>

                    <!-- Size Range -->
                    <div class="grid grid-cols-2 gap-6 pb-6 border-b border-gray-200">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Minimum Size</label>
                            <p class="detail-value" id="detailSizeMin">-</p>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Maximum Size</label>
                            <p class="detail-value" id="detailSizeMax">-</p>
                        </div>
                    </div>

                    <!-- Number of Sets -->
                    <div class="pb-6 border-b border-gray-200">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Number of Sets</label>
                        <p class="detail-value" id="detailQuantity">-</p>
                    </div>

                    <!-- Stock Status -->
                    <div class="pb-6 border-b border-gray-200">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Stock Status</label>
                        <div id="detailStockStatus" class="flex items-center gap-2">
                            <span class="inline-block h-3 w-3 bg-blue-500 rounded-full"></span>
                            <span class="detail-value">In Stock</span>
                        </div>
                    </div>

                    <!-- Created Date -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Created Date</label>
                        <p class="detail-value text-gray-500" id="detailCreatedDate">-</p>
                    </div>

                </div>

                <!-- Action Buttons -->
                <div class="flex gap-4 pt-8 mt-8 border-t border-gray-200" id="actionButtons" style="display: none;">
                    <button onclick="goToDashboard()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-lg transition">
                        <i class="fa-solid fa-home mr-2"></i> Back to Dashboard
                    </button>
                    <button onclick="editProduct()" class="flex-1 bg-gradient-to-r from-[#1e40af] to-[#2563eb] hover:from-[#2563eb] hover:to-[#2563eb] text-white font-semibold py-2.5 rounded-lg transition shadow-md hover:shadow-lg">
                        <i class="fa-solid fa-pen mr-2"></i> Edit Product
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <footer class="mt-8 text-center text-gray-400 text-xs pb-4">
                &copy; 2026 sajha karobar. All rights reserved.
            </footer>

        </div>
    </main>

    <script src="/assets/Js/components/sidebar.js"></script>
    <script src="/assets/Js/product.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initSidebar('product');
        });
    </script>
</body>

</html>
